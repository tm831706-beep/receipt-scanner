<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシートスキャナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f2;
  --text2: #888892;
  --text3: #55555f;
  --accent: #7fffb0;
  --accent-dim: rgba(127,255,176,0.12);
  --accent-border: rgba(127,255,176,0.35);
  --warn: #ffd166;
  --warn-dim: rgba(255,209,102,0.12);
  --danger: #ff6b6b;
  --danger-dim: rgba(255,107,107,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; overscroll-behavior: none; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
#main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }

/* Nav */
#nav { display: flex; background: var(--surface); border-top: 0.5px solid var(--border); padding: 6px 0 env(safe-area-inset-bottom, 6px); position: sticky; bottom: 0; z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 4px; cursor: pointer; color: var(--text3); font-size: 11px; border: none; background: none; transition: color 0.15s; }
.nav-btn .icon { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--accent); }

/* Panes */
.pane { display: none; }
.pane.active { display: block; }

/* API key screen */
#api-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 24px; text-align: center; }
#api-screen h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
#api-screen p { color: var(--text2); font-size: 13px; line-height: 1.7; margin-bottom: 24px; }
.api-input-wrap { width: 100%; position: relative; margin-bottom: 12px; }
.api-input-wrap input { width: 100%; padding: 13px 16px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
.api-input-wrap input:focus { border-color: var(--accent-border); }
.hint { font-size: 11px; color: var(--text3); line-height: 1.6; }
.hint a { color: var(--accent); text-decoration: none; }

/* Buttons */
.btn { padding: 12px 20px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; width: 100%; }
.btn:active { transform: scale(0.97); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #0a1a10; font-weight: 700; }
.btn-accent:active { background: #5fdf8a; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-sm { padding: 7px 12px; font-size: 12px; width: auto; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }

/* Camera */
#cam-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
#cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
#cam-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); }
#cam-placeholder .big-icon { font-size: 48px; opacity: 0.4; }
#cam-flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
#cam-guide { position: absolute; inset: 20px; border: 1.5px solid rgba(127,255,176,0.4); border-radius: var(--radius); pointer-events: none; }
#cam-guide::before, #cam-guide::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; }
#cam-guide::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
#cam-guide::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

#scanning-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
#scanning-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 2.5px solid rgba(127,255,176,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#scanning-overlay span { color: var(--accent); font-size: 13px; font-weight: 500; }

#cam-controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; display: none; justify-content: center; align-items: center; gap: 20px; }
#cam-controls.show { display: flex; }
#shutter { width: 68px; height: 68px; border-radius: 50%; background: var(--accent); border: 3px solid rgba(255,255,255,0.3); box-shadow: 0 0 0 4px rgba(127,255,176,0.25); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform 0.1s; }
#shutter:active { transform: scale(0.9); }
#flip-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 0.5px solid rgba(255,255,255,0.2); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

#cam-status-bar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); color: var(--accent); font-size: 11px; font-weight: 500; padding: 4px 14px; border-radius: 20px; white-space: nowrap; display: none; border: 0.5px solid var(--accent-border); }

/* Result drawer */
#result-drawer { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: none; }
#result-drawer.show { display: block; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.drawer-title { font-size: 13px; font-weight: 700; }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.badge-ok { background: var(--accent-dim); color: var(--accent); border: 0.5px solid var(--accent-border); }
.badge-warn { background: var(--warn-dim); color: var(--warn); border: 0.5px solid rgba(255,209,102,0.3); }
.badge-ng { background: var(--danger-dim); color: var(--danger); border: 0.5px solid rgba(255,107,107,0.25); }

#thumb-preview { width: 100%; height: 100px; object-fit: contain; border-radius: var(--radius-sm); background: var(--surface2); margin-bottom: 14px; display: none; }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; letter-spacing: 0.03em; }
.field input, .field select { width: 100%; padding: 10px 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: var(--accent-border); }
.field select option { background: var(--surface2); }
.field input[type=number] { font-family: 'DM Mono', monospace; }

.drawer-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 14px; }

/* Progress bar */
.prog-wrap { height: 2px; background: var(--surface2); border-radius: 2px; margin-bottom: 10px; overflow: hidden; display: none; }
.prog-wrap.show { display: block; }
.prog-bar { height: 2px; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* Status text */
#status { font-size: 12px; color: var(--text2); min-height: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* Cam start area */
#cam-start-area { display: flex; flex-direction: column; gap: 8px; }
.or-divider { display: flex; align-items: center; gap: 10px; color: var(--text3); font-size: 11px; }
.or-divider::before, .or-divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

/* List pane */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 15px; font-weight: 700; }
.count-chip { background: var(--accent-dim); color: var(--accent); border: 0.5px solid var(--accent-border); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }

.item-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
.item-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 20px; padding-top: 2px; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.item-del { color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
.item-del:active { color: var(--danger); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 13px; line-height: 1.7; }

/* Export pane */
.export-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.export-card h3 { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
.xl-status { font-size: 12px; margin-top: 8px; min-height: 16px; }
.xl-ok { color: var(--accent); }
.xl-err { color: var(--danger); }

.write-summary { font-size: 13px; color: var(--text2); line-height: 1.7; }
.write-summary strong { color: var(--text); font-weight: 700; }
.write-cols { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; line-height: 1.7; }

/* Top bar */
#topbar { padding: 16px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
#topbar h1 { font-size: 17px; font-weight: 700; }
#topbar .subtitle { font-size: 11px; color: var(--text3); }

input[type=file] { display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

<!-- API KEY SCREEN -->
<div id="api-screen">
  <div style="font-size:52px;margin-bottom:20px">🔑</div>
  <h1>APIキーを設定</h1>
  <p>Google Gemini APIキーを入力してください。<br><code style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)">AIzaSy...</code> で始まるキーです。</p>
  <div class="api-input-wrap">
    <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off" spellcheck="false">
  </div>
  <button class="btn btn-accent" onclick="saveApiKey()" style="margin-bottom:16px">保存して開始</button>
  <p class="hint">キーはこのデバイスにのみ保存されます。<br><a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> で無料取得できます。</p>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;height:100%;display:none;flex-direction:column">

<div id="topbar">
  <div>
    <h1>レシートスキャナー</h1>
    <div class="subtitle">在庫管理表 連携</div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="resetApiKey()" style="width:auto;color:var(--text3);font-size:11px">APIキー変更</button>
</div>

<div id="main" style="flex:1;overflow-y:auto;padding:12px 16px 80px">

<!-- SCAN PANE -->
<div id="pane-scan" class="pane active">
  <div id="cam-container">
    <video id="cam-video" autoplay playsinline muted style="display:none"></video>
    <div id="cam-placeholder">
      <div class="big-icon">📷</div>
      <div style="font-size:13px">カメラを起動してください</div>
    </div>
    <div id="cam-guide" style="display:none"></div>
    <div id="cam-flash"></div>
    <div id="cam-status-bar"></div>
    <div id="scanning-overlay">
      <div class="spinner"></div>
      <span>AIが解析中...</span>
    </div>
    <div id="cam-controls">
      <div id="flip-btn" onclick="flipCam()">🔄</div>
      <div id="shutter" onclick="shoot()">📸</div>
      <div style="width:44px"></div>
    </div>
  </div>

  <div id="cam-start-area">
    <button class="btn btn-accent" id="start-btn" onclick="startCam()">📷 カメラ起動</button>
    <button class="btn" id="stop-btn" onclick="stopCam()" style="display:none">■ 停止</button>
    <div class="or-divider">または</div>
    <button class="btn" onclick="document.getElementById('fi').click()">📁 画像ファイルから選択</button>
    <input type="file" id="fi" accept="image/*" multiple onchange="handleFiles(this.files)">
  </div>

  <div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div id="status"></div>

  <div id="result-drawer">
    <div class="drawer-header">
      <span class="drawer-title">抽出結果を確認・編集</span>
      <span id="conf-badge" class="badge badge-ok"></span>
    </div>
    <img id="thumb-preview">
    <div class="field"><label>商品名 ★</label><input id="f-name" type="text" placeholder="商品名"></div>
    <div class="field"><label>JANコード</label><input id="f-jan" type="text" placeholder="4901234567890" inputmode="numeric" style="font-family:'DM Mono',monospace"></div>
    <div class="field"><label>仕入日 ★</label><input id="f-date" type="date"></div>
    <div class="field"><label>購入金額（円）</label><input id="f-price" type="number" inputmode="numeric" placeholder="1540"></div>
    <div class="field"><label>仕入先・店舗名</label><input id="f-supplier" type="text" placeholder="ドンキホーテ 博多店"></div>
    <div class="field"><label>購入元カテゴリ</label>
      <select id="f-cat">
        <option value="">選択してください</option>
        <option>店舗他</option><option>amazon</option><option>楽天</option>
        <option>ヤフショ</option><option>aupay</option><option>スニダン</option><option>その他</option>
      </select>
    </div>
    <div class="field"><label>ステータス</label>
      <select id="f-status">
        <option value="受領">受領</option>
        <option value="販売中">販売中</option>
        <option value="販売済">販売済</option>
      </select>
    </div>
    <div class="drawer-actions">
      <button class="btn" onclick="discardResult()">破棄</button>
      <button class="btn btn-accent" onclick="confirmAdd()">✓ 追加して次へ</button>
    </div>
  </div>
</div>

<!-- LIST PANE -->
<div id="pane-list" class="pane">
  <div class="section-header">
    <span class="section-title">登録リスト <span id="count-chip" class="count-chip" style="display:none">0</span></span>
    <button class="btn btn-ghost btn-sm" onclick="clearAll()" style="color:var(--danger);width:auto">全削除</button>
  </div>
  <div id="item-list"></div>
  <div id="list-empty" class="empty-state">
    <div class="icon">📋</div>
    <p>スキャンタブで商品を追加すると<br>ここに表示されます</p>
  </div>
</div>

<!-- EXPORT PANE -->
<div id="pane-export" class="pane">
  <div class="export-card">
    <h3>① 管理表Excelをアップロード</h3>
    <button class="btn" onclick="document.getElementById('xl-fi').click()">📂 ファイルを選択</button>
    <input type="file" id="xl-fi" accept=".xlsx" onchange="loadXL(this)">
    <div id="xl-status" class="xl-status"></div>
  </div>
  <div class="export-card">
    <h3>② 書き込み内容</h3>
    <div id="write-preview" class="write-summary">リストが空です</div>
  </div>
  <button class="btn btn-accent" id="write-btn" disabled onclick="writeXL()" style="margin-bottom:8px">Excelに書き込んでダウンロード ↓</button>
  <div id="write-status" style="font-size:12px;color:var(--text2);min-height:18px"></div>
</div>

</div><!-- /main -->

<!-- NAV -->
<div id="nav">
  <button class="nav-btn active" onclick="sw('scan')" id="nav-scan">
    <span class="icon">📷</span>スキャン
  </button>
  <button class="nav-btn" onclick="sw('list')" id="nav-list">
    <span class="icon">📋</span>リスト
  </button>
  <button class="nav-btn" onclick="sw('export')" id="nav-export">
    <span class="icon">📥</span>Excel出力
  </button>
</div>

</div><!-- /main-app -->
</div><!-- /app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let rows = [], stream = null, facingMode = 'environment';
let excelData = null, excelFileName = '';
let apiKey = '';

// --- Init ---
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('receipt_api_key');
  if (saved) { apiKey = saved; showApp(); }
});

function saveApiKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (v.length < 10) { alert('APIキーを入力してください'); return; }
  apiKey = v;
  localStorage.setItem('receipt_api_key', v);
  showApp();
}

function showApp() {
  document.getElementById('api-screen').style.display = 'none';
  const app = document.getElementById('main-app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  app.style.height = '100%';
}

function resetApiKey() {
  if (!confirm('APIキーをリセットしますか？')) return;
  localStorage.removeItem('receipt_api_key');
  apiKey = ''; stopCam();
  document.getElementById('api-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
}

// --- Tabs ---
function sw(name) {
  ['scan','list','export'].forEach(t => {
    document.getElementById('pane-'+t).classList.toggle('active', t===name);
    document.getElementById('nav-'+t).classList.toggle('active', t===name);
  });
  if (name === 'export') updateWritePreview();
}

// --- Camera ---
async function startCam() {
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const v = document.getElementById('cam-video');
    v.srcObject = stream; v.style.display = 'block';
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('cam-guide').style.display = 'block';
    document.getElementById('cam-controls').classList.add('show');
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = '';
    camStatus('📷 準備完了 — 撮影してください');
  } catch(e) {
    setStatus('⚠ カメラを起動できません。「画像ファイルから選択」をお使いください。');
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const v = document.getElementById('cam-video');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('cam-guide').style.display = 'none';
  document.getElementById('cam-controls').classList.remove('show');
  document.getElementById('start-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
}

async function flipCam() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCam();
}

function camStatus(msg) {
  const el = document.getElementById('cam-status-bar');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 2500);
}

function flash() {
  const f = document.getElementById('cam-flash');
  f.style.transition = 'none'; f.style.opacity = '0.9';
  requestAnimationFrame(() => { f.style.transition = 'opacity 0.5s'; f.style.opacity = '0'; });
}

async function shoot() {
  const v = document.getElementById('cam-video');
  if (!v.srcObject) return;
  flash();
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  document.getElementById('cam-controls').classList.remove('show');
  document.getElementById('scanning-overlay').classList.add('show');
  const result = await callClaude(dataUrl.split(',')[1], 'image/jpeg');
  document.getElementById('scanning-overlay').classList.remove('show');
  if (result) {
    showResult(result, dataUrl);
    camStatus('✓ 抽出完了');
  } else {
    document.getElementById('cam-controls').classList.add('show');
    camStatus('⚠ 読み取れませんでした。再撮影してください。');
  }
}

// --- File input ---
async function handleFiles(files) {
  files = Array.from(files);
  if (!files.length) return;
  if (files.length === 1) {
    const b64 = await toBase64(files[0]);
    const mt = files[0].type || 'image/jpeg';
    setStatus('解析中...');
    const r = await callClaude(b64, mt);
    setStatus('');
    showResult(r || {}, 'data:'+mt+';base64,'+b64);
  } else {
    const pw = document.getElementById('prog-wrap');
    const pb = document.getElementById('prog-bar');
    pw.classList.add('show');
    for (let i = 0; i < files.length; i++) {
      setStatus(`処理中 ${i+1}/${files.length}：${files[i].name}`);
      pb.style.width = Math.round(i/files.length*100) + '%';
      const b64 = await toBase64(files[i]);
      const r = await callClaude(b64, files[i].type || 'image/jpeg');
      if (r && (r.product_name || r.jan)) addRow(r);
    }
    pb.style.width = '100%';
    setStatus(`✓ ${files.length}枚処理しました`);
    setTimeout(() => pw.classList.remove('show'), 1500);
  }
}

// --- Gemini API ---
async function callClaude(b64, mt) {
  const today = new Date().toISOString().slice(0, 10);
  const prompt = `このレシート・商品画像から情報を抽出してください。JSONのみ返答（説明・マークダウン不要）：
{"product_name":"商品名","jan":"JANコード13桁（なければ空文字）","purchase_date":"YYYY-MM-DD（なければ${today}）","price":税込金額の数値かnull,"supplier":"店舗名（なければ空文字）","category":"店舗他/amazon/楽天/ヤフショ/aupay/スニダン/その他 から選択"}`;
  try {
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: mt, data: b64 } },
            { text: prompt }
          ]}],
          generationConfig: { temperature: 0.1, maxOutputTokens: 400 }
        })
      }
    );
    const d = await resp.json();
    if (d.error) { console.error(d.error); return null; }
    const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = txt.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) { console.error(e); return null; }
}

function toBase64(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

// --- Result ---
function showResult(r, thumb) {
  document.getElementById('f-name').value = r.product_name || '';
  document.getElementById('f-jan').value = r.jan || '';
  document.getElementById('f-date').value = r.purchase_date || new Date().toISOString().slice(0,10);
  document.getElementById('f-price').value = r.price != null ? r.price : '';
  document.getElementById('f-supplier').value = r.supplier || '';
  const cat = document.getElementById('f-cat');
  cat.value = [...cat.options].map(o => o.value).includes(r.category) ? r.category : '';
  document.getElementById('f-status').value = '受領';

  const filled = [r.product_name, r.jan, r.purchase_date, r.price, r.supplier].filter(Boolean).length;
  const badge = document.getElementById('conf-badge');
  if (filled >= 4) { badge.textContent = '✓ 読み取り良好'; badge.className = 'badge badge-ok'; }
  else if (filled >= 2) { badge.textContent = '△ 一部未取得'; badge.className = 'badge badge-warn'; }
  else { badge.textContent = '✕ 手動入力を'; badge.className = 'badge badge-ng'; }

  if (thumb) {
    const img = document.getElementById('thumb-preview');
    img.src = thumb; img.style.display = 'block';
  }
  document.getElementById('result-drawer').classList.add('show');
}

function discardResult() {
  document.getElementById('result-drawer').classList.remove('show');
  document.getElementById('thumb-preview').style.display = 'none';
  if (stream) document.getElementById('cam-controls').classList.add('show');
}

function confirmAdd() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  addRow({
    product_name: name,
    jan: document.getElementById('f-jan').value.trim(),
    purchase_date: document.getElementById('f-date').value,
    price: document.getElementById('f-price').value ? Number(document.getElementById('f-price').value) : null,
    supplier: document.getElementById('f-supplier').value.trim(),
    category: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
  });
  discardResult();
  setStatus('✓ 追加しました。次の商品を撮影してください。');
  setTimeout(() => setStatus(''), 2500);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// --- Rows ---
function addRow(r) {
  rows.push(r); renderList(); updateBadge();
}

function renderList() {
  const el = document.getElementById('item-list');
  const emp = document.getElementById('list-empty');
  if (!rows.length) { el.innerHTML = ''; emp.style.display = 'block'; return; }
  emp.style.display = 'none';
  el.innerHTML = rows.map((r, i) => `
    <div class="item-card">
      <span class="item-num">${i+1}</span>
      <div class="item-body">
        <div class="item-name">${esc(r.product_name)}</div>
        <div class="item-meta">
          ${r.jan ? '<span>JAN: '+esc(r.jan)+'</span>' : ''}
          ${r.purchase_date ? '<span>'+r.purchase_date+'</span>' : ''}
          ${r.price != null ? '<span>¥'+r.price.toLocaleString()+'</span>' : ''}
          ${r.supplier ? '<span>'+esc(r.supplier)+'</span>' : ''}
        </div>
      </div>
      <span class="item-del" onclick="delRow(${i})">×</span>
    </div>`).join('');
}

function delRow(i) { rows.splice(i, 1); renderList(); updateBadge(); }
function clearAll() {
  if (rows.length && !confirm('全削除しますか？')) return;
  rows = []; renderList(); updateBadge();
}
function updateBadge() {
  const c = document.getElementById('count-chip');
  c.textContent = rows.length; c.style.display = rows.length ? '' : 'none';
  updateWritePreview();
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// --- Excel ---
function loadXL(input) {
  const file = input.files[0]; if (!file) return;
  excelFileName = file.name;
  document.getElementById('xl-status').textContent = '読み込み中...';
  const reader = new FileReader();
  reader.onload = ev => {
    excelData = new Uint8Array(ev.target.result);
    document.getElementById('xl-status').className = 'xl-status xl-ok';
    document.getElementById('xl-status').textContent = '✓ ' + file.name;
    updateWritePreview();
  };
  reader.onerror = () => {
    document.getElementById('xl-status').className = 'xl-status xl-err';
    document.getElementById('xl-status').textContent = '読み込みエラー';
  };
  reader.readAsArrayBuffer(file);
}

function updateWritePreview() {
  const el = document.getElementById('write-preview');
  const btn = document.getElementById('write-btn');
  if (!rows.length) { el.innerHTML = 'リストが空です'; btn.disabled = true; return; }
  el.innerHTML = `<strong>${rows.length}件</strong>を「管理表」シートの最終行に追記します
    <div class="write-cols">ステータス / 年 / 月 / 購入元 / 仕入日 / 仕入先 / 商品名 / 購入金額 / JAN</div>`;
  btn.disabled = !excelData;
}

function writeXL() {
  if (!excelData || !rows.length) return;
  document.getElementById('write-btn').disabled = true;
  document.getElementById('write-status').textContent = '書き込み中...';
  try {
    const wb = XLSX.read(excelData, { type: 'array', cellDates: true });
    const ws = wb.Sheets['管理表'];
    if (!ws) { alert('「管理表」シートが見つかりません'); return; }
    const range = XLSX.utils.decode_range(ws['!ref']);
    let lastRow = 3;
    for (let r = range.e.r; r >= 3; r--) {
      if (ws[XLSX.utils.encode_cell({r,c:0})] || ws[XLSX.utils.encode_cell({r,c:6})]) { lastRow = r; break; }
    }
    rows.forEach((row, idx) => {
      const r = lastRow + 1 + idx;
      const dt = row.purchase_date ? new Date(row.purchase_date) : null;
      const set = (c, t, v) => { ws[XLSX.utils.encode_cell({r,c})] = {t, v}; };
      set(0, 's', row.status || '受領');
      if (dt) { set(1, 'n', dt.getFullYear()); set(2, 's', (dt.getMonth()+1)+'月'); set(4, 'd', dt); }
      if (row.category) set(3, 's', row.category);
      if (row.supplier) set(5, 's', row.supplier);
      set(6, 's', row.product_name || '');
      if (row.price != null) set(7, 'n', row.price);
      if (row.jan) set(15, 's', row.jan);
      if (r > range.e.r) range.e.r = r;
    });
    ws['!ref'] = XLSX.utils.encode_range(range);
    const fname = excelFileName.replace('.xlsx','') + '_updated.xlsx';
    XLSX.writeFile(wb, fname);
    document.getElementById('write-status').textContent = '✓ ダウンロード完了：' + fname;
  } catch(err) {
    document.getElementById('write-status').textContent = 'エラー：' + err.message;
  }
  document.getElementById('write-btn').disabled = false;
}
